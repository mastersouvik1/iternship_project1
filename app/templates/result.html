{% extends "base.html" %}

{% block content %}
<div class="result-approved relative z-10 w-full max-w-lg mx-auto px-4 py-12">
    <div class="glass-card rounded-2xl p-8 sm:p-12 animate-scale-in">
        <div class="flex justify-center mb-6">
            <div class="icon-circle w-24 h-24 rounded-full flex items-center justify-center">
                <svg class="checkmark w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
                </svg>
                <!-- <svg class="xmark w-12 h-12 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"/>
                </svg> -->
            </div>
        </div>

        <div class="text-center mb-8">
            <h1 class="result-text text-5xl sm:text-6xl font-extrabold mb-3">
                Approved
            </h1>
            <p class="text-gray-300 text-lg">
                Your loan application has been approved!
            </p>
        </div>

        <div class="flex flex-col items-center mb-8">
            <p class="text-sm text-gray-400 mb-4 font-medium">Confidence Score</p>
            <div class="confidence-ring" style="--confidence: 92%">
                <div class="confidence-inner">
                    <div class="text-4xl font-bold text-white">92%</div>
                    <div class="text-xs text-gray-400 mt-1">Certainty</div>
                </div>
            </div>
        </div>

       <div class="mt-8 text-center">

    <p class="text-lg text-gray-600">
        Your Monthly Income: ₹{{ income }}
    </p>

    <p class="text-lg text-gray-600 mt-2">
        Estimated Eligible Loan Amount:
    </p>

    <h2 class="text-3xl font-bold text-indigo-600 mt-2">
        ₹{{ loan_amount }}
    </h2>

</div>
    </div>
</div>
{% endblock %}
