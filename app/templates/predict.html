{% extends "base.html" %}

{% block content %}

<div class="py-16">
    <div class="max-w-3xl mx-auto px-4">
        <div class="bg-white rounded-2xl shadow-xl p-8">

            <h2 class="text-3xl font-bold text-gray-900 mb-6 text-center">
                Apply for a Loan
            </h2>

            <form action="/predict" method="POST" class="space-y-6">

                <div>
                    <label>Income</label>
                    <input type="number" name="ApplicantIncome" required class="w-full border p-2">
                </div>

                <div>
                    <label>Credit History (1 or 0)</label>
                    <input type="number" name="Credit_History" required class="w-full border p-2">
                </div>

                <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded">
                    Submit
                </button>

            </form>

        </div>
    </div>
</div>

{% endblock %}
